<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #c2beb6;
      font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 13px;
      line-height: 1.4;
    }
    .terminal {
      padding: 32px 40px;
      min-height: 100vh;
    }
    pre {
      margin: 0;
      white-space: pre;
      overflow-x: auto;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .curl-examples {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #1e1c19;
      color: #6f6b64;
      font-size: 12px;
    }
    .curl-examples code {
      color: #c2beb6;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <pre>{{.Body}}</pre>
    <div class="curl-examples">
      <p>try it from your terminal:</p>
      <pre><code>curl curlstreet.sh/AAPL
curl curlstreet.sh/BTC,ETH
curl curlstreet.sh/TSLA?format=json</code></pre>
      <p>IP geolocation by <a href="https://db-ip.com">DB-IP</a></p>
    </div>
  </div>
</body>
</html>
