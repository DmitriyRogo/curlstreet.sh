server:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 10s
  trusted_proxy: ""  # CIDR of your reverse proxy (e.g. "10.0.0.0/8"); leave empty when running without a proxy

cache:
  capacity: 1000
  ttl: 60s

finnhub:
  api_key: ""
  timeout: 5s

coingecko:
  timeout: 5s

rate_limit:
  requests_per_minute: 60
  burst: 10
