name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build, Vet & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race ./...
